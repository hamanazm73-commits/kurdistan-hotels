<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پەڕەی ئەدمین - حیجزکردنەکان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <body>
    <!-- بەشی چوونەژوورەوە -->
    <div id="loginSection">
        <h1>چوونەژوورەوەی ئەدمین</h1>
        <input type="email" id="email" placeholder="ئیمەیڵ">
        <input type="password" id="password" placeholder="وشەی نهێنی">
        <button id="loginBtn">چوونەژوورەوە</button>
        <p id="loginError"></p>
    </div>

    <!-- بەشی حیجزکردنەکان (سەرەتا شاراوە) -->
    <div id="adminSection" style="display: none;">
        <h1>لیستی حیجزکردنەکان</h1>
        <button id="logoutBtn">چوونەدەرەوە</button>
        <div id="reservationsList">
            <p>چاوەڕێبە...</p>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</body>
</html>
