<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چوونەژوورەوە — هۆتێلەکانی کوردستان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  /* ئەگەر پێشتر چووبێتە ژوورەوە، ڕاستەوخۆ بیبە بۆ ماڵپەڕ */
  if (sessionStorage.getItem("hotelLoggedIn") === "yes") {
    window.location.href = "index.html";
  }
</script>
</head>
<body class="auth-body">

  <!-- پاشبنەمای ئەنیمەیتکراو (شاخەکانی کوردستان + ئەستێرەکان) -->
  <div class="hero-bg" aria-hidden="true">
    <span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span>
    <svg class="mountains" viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path class="m-back" d="M0,224 L240,128 L480,224 L720,96 L960,208 L1200,112 L1440,208 L1440,320 L0,320 Z"></path>
      <path class="m-front" d="M0,288 L180,200 L360,288 L540,176 L720,272 L900,168 L1080,272 L1260,192 L1440,272 L1440,320 L0,320 Z"></path>
    </svg>
  </div>

  <!-- هەڵبژاردنی زمان -->
  <div class="auth-lang">
    <button class="lang-chip" data-lang="ckb" onclick="applyLanguage('ckb')">کوردی</button>
    <button class="lang-chip" data-lang="en" onclick="applyLanguage('en')">English</button>
    <button class="lang-chip" data-lang="ar" onclick="applyLanguage('ar')">العراقي</button>
  </div>

  <!-- کارتی چوونەژوورەوە -->
  <main class="auth-card">
    <div class="auth-logo">🏨</div>
    <p class="auth-brand" data-i18n="login_brand">هۆتێلەکانی کوردستان</p>
    <h1 class="auth-title" data-i18n="login_welcome">بەخێربێیتەوە 👋</h1>
    <p class="auth-sub" data-i18n="login_subtitle">بچۆ ژوورەوە بۆ بینینی هۆتێلەکان</p>

    <form id="loginForm" autocomplete="off">
      <div class="auth-field">
        <span class="auth-ico">👤</span>
        <input type="text" id="username" data-i18n-ph="login_user" placeholder="ناوی بەکارهێنەر">
      </div>
      <div class="auth-field">
        <span class="auth-ico">🔒</span>
        <input type="password" id="password" data-i18n-ph="login_pass" placeholder="وشەی نهێنی">
      </div>
      <button type="submit" class="auth-btn" data-i18n="login_btn">چوونەژوورەوە</button>
      <p id="loginError" class="auth-error"></p>
      <p class="auth-hint" data-i18n="login_hint">تاقیکردنەوە — ناو: admin | وشەی نهێنی: 1234</p>
    </form>
  </main>

  <script src="translations.js"></script>
  <script>
    /* ===== چوونەژوورەوەی تاقیکردنەوە (TEST) =====
       ئەمە تەنها بۆ تاقیکردنەوەیە — پشکنین لای کلاینت دەکرێت.
       بۆ ئاسایشی ڕاستەقینە، دواتر بە Firebase Auth بیگۆڕە. */
    const TEST_USER = "admin";
    const TEST_PASS = "1234";

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      const err = document.getElementById("loginError");

      if (u === TEST_USER && p === TEST_PASS) {
        sessionStorage.setItem("hotelLoggedIn", "yes");
        document.querySelector(".auth-card").classList.add("auth-success");
        setTimeout(function () { window.location.href = "index.html"; }, 450);
      } else {
        err.textContent = t("login_error");
        document.querySelector(".auth-card").classList.remove("shake");
        void document.querySelector(".auth-card").offsetWidth; /* ڕیستارتی ئەنیمەیشن */
        document.querySelector(".auth-card").classList.add("shake");
      }
    });
  </script>
</body>
</html>
